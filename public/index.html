      if (!state.recommendedKeywords) state.recommendedKeywords = [];
      if (!state.seo) state.seo = {};
      if (!state.missions) state.missions = {};
      if (!state.calendar) state.calendar = {};
      if (!state.streak) state.streak = 0;

}

function searchPlace() {
  var query = document.getElementById('placeSearchInput').value.trim();
  if (!query) return alert('업체명을 입력하세요');
  var wrap = document.getElementById('placeResults');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><br>검색 중...</div>';
  fetch('/api/naver-search?query=' + encodeURIComponent(query))
    .then(function(r){return r.json()})
    .then(function(data){
      var items = data.items || [];
      if (items.length === 0) {
        wrap.innerHTML = '<p style="text-align:center;color:#666;padding:20px">검색 결과가 없습니다.</p>';
        return;
      }
      var html = '';
      items.forEach(function(item){
        var name = item.title.replace(/<[^>]*>/g,'');
        var addr = item.roadAddress || item.address || '';
        var cat = item.category || '';
        html += '<div class="place-item" onclick="selectPlace(this)" data-name="'+name.replace(/"/g,'&quot;')+'" data-addr="'+addr.replace(/"/g,'&quot;')+'" data-cat="'+cat.replace(/"/g,'&quot;')+'">';
        html += '<h4>'+name+'</h4>';
        html += '<p>'+addr+(cat?' · '+cat:'')+'</p>';
        html += '</div>';
      });
      wrap.innerHTML = html;
    })
    .catch(function(err){
      wrap.innerHTML = '<p style="color:red;text-align:center">검색 오류: '+err.message+'</p>';
    });

function extractRegion(address) {
  if (!address) return '';
  var parts = address.split(' ');
  for (var i = 0; i < parts.length && i < 4; i++) {
    var p = parts[i];
    if (p.length >= 2 && (p.indexOf('구') !== -1 || p.indexOf('동') !== -1 || p.indexOf('읍') !== -1 || p.indexOf('면') !== -1)) {
      return p;
    }
  }
  if (parts.length >= 2) return parts[1];
  return parts[0] || '';
}

function renderKeywordTable(keywords) {
  var top30 = keywords.slice(0, 30);

  top30.forEach(function(kw){
    var gradeClass = kw.grade === '대형' ? 'grade-large' : kw.grade === '중형' ? 'grade-medium' : 'grade-small';
    var vol = kw.totalVolume;
    var volStr = vol >= 10000 ? (vol/10000).toFixed(1)+'만' : vol >= 1000 ? (vol/1000).toFixed(1)+'천' : vol+'';
    html += '<tr>';
    html += '<td><strong>'+kw.keyword+'</strong></td>';

    html += '<td>'+kw.competition+'</td>';
    html += '<td><span class="grade-tag '+gradeClass+'">'+kw.grade+'</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  if (keywords.length > 30) {
    html += '<p style="text-align:center;color:#999;font-size:12px;margin-top:8px">상위 30개 표시 (전체 '+keywords.length+'개)</p>';
  }
  document.getElementById('kwResults').innerHTML = html;
}

function recommendTopKeywords(keywords, region) {
  var recommended = [];
  var usedWords = {};

  // 1순위: 지역+소형/중형 (빠른 상위노출)
  keywords.filter(function(kw){
    return region && kw.keyword.indexOf(region) !== -1 && (kw.grade === '소형' || kw.grade === '중형');
  }).forEach(function(kw){
    if (recommended.length >= 2 || hasDuplicateWord(kw.keyword, usedWords)) return;
    recommended.push(kw); addWords(kw.keyword, usedWords);
  });

  // 2순위: 중형 키워드 (성장 여지)
  keywords.filter(function(kw){return kw.grade === '중형'}).forEach(function(kw){
    if (recommended.length >= 4 || hasDuplicateWord(kw.keyword, usedWords)) return;
    recommended.push(kw); addWords(kw.keyword, usedWords);
  });

  // 3순위: 소형 중 검색량 있는 것 (롱테일)
  keywords.filter(function(kw){return kw.grade === '소형' && kw.totalVolume >= 50}).forEach(function(kw){
    if (recommended.length >= 5 || hasDuplicateWord(kw.keyword, usedWords)) return;
    recommended.push(kw); addWords(kw.keyword, usedWords);
  });

  // 부족하면 채우기
  keywords.forEach(function(kw){
    if (recommended.length >= 5) return;
    var already = recommended.some(function(r){return r.keyword === kw.keyword});
    if (!already) recommended.push(kw);
  });

  recommended = recommended.slice(0, 5);
  state.recommendedKeywords = recommended.map(function(kw){return kw.keyword});
  saveState();

  var wrap = document.getElementById('kwResults');
  var html = '<div class="recommend-box">';
  html += '<h4>✅ 추천 대표 키워드 5개</h4><ul>';
  recommended.forEach(function(kw, i){
    var note = '';
    if (region && kw.keyword.indexOf(region) !== -1) note = ' 📍지역';
    if (kw.grade === '소형') note += ' 🚀빠른노출';
    else if (kw.grade === '중형') note += ' 📈성장';
    else if (kw.grade === '대형') note += ' 🔥경쟁높음';
    html += '<li><strong>'+(i+1)+'. '+kw.keyword+'</strong> — 월 '+kw.totalVolume+'회'+note+'</li>';
  });
  html += '</ul>';
  html += '<p style="font-size:11px;color:#666;margin-top:8px">💡 소형→중형→대형 순서로 공략. 2~3개월마다 재분석하여 교체하세요.</p>';
  html += '</div>';
  wrap.innerHTML += html;
}

function hasDuplicateWord(keyword, usedWords) {
  var words = keyword.split(' ');
  for (var i = 0; i < words.length; i++) {
    if (words[i].length >= 2 && usedWords[words[i]]) return true;
  }
  return false;
}

function addWords(keyword, usedWords) {
  keyword.split(' ').forEach(function(w){ if (w.length >= 2) usedWords[w] = true; });
}

/* ============================================
   트렌드 차트
============================================ */
function loadTrend(keyword) {
  fetch('/api/keyword-trend?keyword=' + encodeURIComponent(keyword))
    .then(function(r){return r.json()})
    .then(function(data){
      if (data.results && data.results.length > 0) {
        var points = data.results[0].data || [];
        if (points.length > 0) {
          renderTrendChart(points);
          document.getElementById('trendCard').classList.remove('hidden');
        }
      }
    })
    .catch(function(err){ console.log('트렌드 오류:', err); });
}

function renderTrendChart(points) {
  var wrap = document.getElementById('trendChart');
  var maxVal = Math.max.apply(null, points.map(function(p){return p.ratio}));
  if (maxVal === 0) maxVal = 1;
  var html = '';
  points.forEach(function(p){
    var h = Math.round((p.ratio / maxVal) * 100);
    var label = p.period.substring(5,7) + '월';
    html += '<div class="trend-bar-wrap">';
    html += '<div class="trend-value">'+Math.round(p.ratio)+'</div>';
    html += '<div class="trend-bar" style="height:'+h+'px"></div>';
    html += '<div class="trend-label">'+label+'</div>';
    html += '</div>';
  });
  wrap.innerHTML = html;
}

/* ============================================
   소개글 가이드
============================================ */
function generateGuide() {
  if (!state.industry || !state.place) return alert('업체 정보가 필요합니다.');
  var region = extractRegion(state.place.address || '');
  var speciality = document.getElementById('guideSpeciality').value.trim();
  var topKeywords = state.recommendedKeywords || [];

  document.getElementById('guideLoading').classList.remove('hidden');
  document.getElementById('guideResults').innerHTML = '';

  fetch('/api/generate-guide', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      industry: state.industry,
      region: region,
      placeName: state.place.name,
      speciality: speciality,
      topKeywords: topKeywords
    })
  })
  .then(function(r){return r.json()})
  .then(function(data){
    document.getElementById('guideLoading').classList.add('hidden');
    if (data.error) {
      document.getElementById('guideResults').innerHTML = '<p style="color:red">오류: '+data.error+'</p>';
      return;
    }
    renderGuideResults(data);
  })
  .catch(function(err){
    document.getElementById('guideLoading').classList.add('hidden');
    document.getElementById('guideResults').innerHTML = '<p style="color:red">생성 실패: '+err.message+'</p>';
  });
}

function renderGuideResults(data) {
  var wrap = document.getElementById('guideResults');
  var html = '';

  html += '<h3 style="margin-top:16px;font-size:15px">📌 소개글 후보 (복사하여 사용)</h3>';
  (data.introOptions || []).forEach(function(opt){
    html += '<div class="guide-intro-card"><h4>버전 '+opt.version+'</h4><p>'+opt.text+'</p></div>';
  });

  if (data.keywordCheck && data.keywordCheck.length > 0) {
    html += '<div class="card" style="margin-top:12px"><h3>🔑 키워드 삽입 체크</h3>';
    data.keywordCheck.forEach(function(kc){
      var icon = kc.includedInIntro ? '✅' : '⚠️';
      html += '<div style="padding:6px 0;font-size:13px;border-bottom:1px solid #f0f0f0">'+icon+' <strong>'+kc.keyword+'</strong> — '+kc.suggestion+'</div>';
    });
    html += '</div>';
  }

  html += '<div class="card" style="margin-top:12px"><h3>📋 상세 설명 작성 가이드</h3>';
  (data.descriptionGuide || []).forEach(function(sec){
    html += '<div class="guide-section"><h4>'+sec.sectionTitle+'</h4>';
    html += '<p class="hint">'+sec.writingHint+'</p>';
    html += '<p class="kw-insert">→ 삽입 키워드: '+sec.keywordToInsert+'</p></div>';
  });
  html += '</div>';

  if (data.keywordPlacementMap) {
    html += '<div class="card" style="margin-top:12px"><h3>🗺️ 키워드 배치 맵</h3><div class="placement-map">';
    Object.keys(data.keywordPlacementMap).forEach(function(key){
      html += '<div class="placement-item"><strong>'+key+'</strong>'+data.keywordPlacementMap[key]+'</div>';
    });
    html += '</div></div>';
  }

  if (data.optimizationTips) {
    html += '<div class="card" style="margin-top:12px"><h3>💡 업종별 최적화 팁</h3><ul class="tip-list">';
    data.optimizationTips.forEach(function(tip){ html += '<li>'+tip+'</li>'; });
    html += '</ul></div>';
  }

  if (data.warnings) {
    html += '<div class="warning-box"><ul>';
    data.warnings.forEach(function(w){ html += '<li>'+w+'</li>'; });
    html += '</ul></div>';
  }

  wrap.innerHTML = html;
}

/* ============================================
   SEO 진단
============================================ */
function renderSEO() {
  var wrap = document.getElementById('seoList');
  var html = '';
  SEO_CHECKLIST.forEach(function(item){
    var score = state.seo[item.id] || 0;
    var filledClass = score > 0 ? ' filled' : '';
    html += '<div class="seo-item">';
    html += '<span class="seo-label">'+item.label+'<a href="'+item.link+'" target="_blank" class="seo-link">확인 →</a>';
    html += '<div class="seo-criteria">'+item.criteria+'</div></span>';
    html += '<button class="seo-score-btn'+filledClass+'" onclick="cycleSEO(\''+item.id+'\')">'+score+'</button>';
    html += '</div>';
  });
  wrap.innerHTML = html;
  updateSEOTotal();
}

function cycleSEO(id) {
  var current = state.seo[id] || 0;
  var idx = SCORE_CYCLE.indexOf(current);
  var next = (idx === -1 || idx >= SCORE_CYCLE.length - 1) ? 0 : SCORE_CYCLE[idx + 1];
  state.seo[id] = next;
  saveState();
  renderSEO();
}

function updateSEOTotal() {
  var total = 0;
  SEO_CHECKLIST.forEach(function(item){ total += (state.seo[item.id] || 0); });
  var maxTotal = SEO_CHECKLIST.length * 10;
  var pct = Math.round((total / maxTotal) * 100);
  var color = pct >= 80 ? 'var(--primary)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  var grade = pct >= 90 ? 'S' : pct >= 80 ? 'A' : pct >= 60 ? 'B' : pct >= 40 ? 'C' : 'D';

  document.getElementById('seoTotal').innerHTML =
    '<div class="score" style="color:'+color+'">'+grade+' <span style="font-size:24px">'+total+'</span><span style="font-size:16px;color:#999">/'+maxTotal+'</span></div>' +
    '<div class="label">SEO 최적화 등급 ('+pct+'%)</div>';

  var improvements = [];
  SEO_CHECKLIST.forEach(function(item){
    if ((state.seo[item.id] || 0) < 8) {
      improvements.push('• ' + item.label + ' (현재 '+(state.seo[item.id]||0)+'/10) → <a href="'+item.link+'" target="_blank" style="color:var(--primary)">개선하기</a>');
    }
  });
  var impWrap = document.getElementById('seoImprove');
  if (improvements.length > 0) {
    impWrap.classList.remove('hidden');
    impWrap.innerHTML = '<strong>🔧 개선 필요 항목 ('+improvements.length+'개):</strong><br>' + improvements.join('<br>');
  } else {
    impWrap.classList.add('hidden');
    impWrap.innerHTML = '';
  }
}

/* ============================================
   미션
============================================ */
function renderMissions() {
  var today = getToday();
  if (!state.missions[today]) {
    state.missions[today] = generateMissions();
    saveState();
  }
  var missions = state.missions[today];
  document.getElementById('missionDate').textContent = today;

  var wrap = document.getElementById('missionList');
  var html = '';
  missions.forEach(function(m, i){
    var doneClass = m.done ? ' done' : '';
    var checkMark = m.done ? '✓' : '';
    html += '<div class="mission-item">';
    html += '<div class="mission-check'+doneClass+'" onclick="toggleMission('+i+')">'+checkMark+'</div>';
    html += '<div class="mission-text"><h4>'+m.title+'</h4><p>'+m.desc+'</p></div>';
    html += '</div>';
  });
  if (missions.length === 0) {
    html = '<p style="text-align:center;color:#999;padding:20px">미션을 생성할 수 없습니다. 업종을 확인하세요.</p>';
  }
  wrap.innerHTML = html;
}

function generateMissions() {
  var missions = [];
  var ind = INDUSTRY_DATA[state.industry];
  if (!ind) ind = INDUSTRY_DATA['service'];
  var dayNum = getDayNum();
  var backlinks = ind.backlinks || [];

  missions.push({title:'리뷰 답글 작성',desc:'최신 리뷰에 감사 답글을 작성하세요. 대표 키워드를 자연스럽게 포함하면 좋습니다.',done:false});

  if (dayNum % 2 === 0) {
    missions.push({title:'새 사진 업로드',desc:'매장/메뉴/서비스 사진을 1~2장 추가 등록하세요.',done:false});
  }

  if (backlinks.length > 0) {
    var blIdx = dayNum % backlinks.length;
    var bl = backlinks[blIdx];
    missions.push({title:bl.name + ' 백링크 작성',desc:bl.name + ' (DA '+bl.da+')에 업체 관련 콘텐츠를 작성하세요. → '+bl.url,done:false});
  }

  if (dayNum % 3 === 0) {
    var lowItems = SEO_CHECKLIST.filter(function(item){ return (state.seo[item.id]||0) < 8; });
    if (lowItems.length > 0) {
      var target = lowItems[dayNum % lowItems.length];
      missions.push({title:'SEO 개선: '+target.label,desc:'현재 '+(state.seo[target.id]||0)+'/10점. 스마트플레이스 관리자에서 확인 후 개선하세요.',done:false});
    }
  }

  if (new Date().getDay() === 5) {
    missions.push({title:'SNS 공유',desc:'인스타그램/페이스북에 업체 소식을 공유하고 플레이스 링크를 포함하세요.',done:false});
  }

  if (dayNum % 7 === 0) {
    missions.push({title:'키워드 트렌드 체크',desc:'키워드 분석 탭에서 최신 검색량을 확인하고 대표 키워드 변경을 검토하세요.',done:false});
  }

  return missions;
}

function toggleMission(idx) {
  var today = getToday();
  if (!state.missions[today]) return;
  state.missions[today][idx].done = !state.missions[today][idx].done;
  var allDone = state.missions[today].every(function(m){return m.done});
  state.calendar[today] = allDone;
  saveState();
  renderMissions();
  renderCalendar();
  updateStreak();
}

/* ============================================
   백링크
============================================ */
function renderBacklinks() {
  var ind = INDUSTRY_DATA[state.industry];
  if (!ind) ind = INDUSTRY_DATA['service'];
  var wrap = document.getElementById('backlinkList');
  var backlinks = ind.backlinks || [];
  if (backlinks.length === 0) {
    wrap.innerHTML = '<p style="text-align:center;color:#999;padding:16px">백링크 사이트 정보가 없습니다.</p>';
    return;
  }
  var sorted = backlinks.slice().sort(function(a,b){return b.da - a.da});
  var html = '';
  sorted.forEach(function(bl){
    html += '<div class="bl-item">';
    html += '<div class="bl-info"><h4>'+bl.name+'</h4><p>Domain Authority</p></div>';
    html += '<span class="bl-da">DA '+bl.da+'</span>';
    html += '<a href="'+bl.url+'" target="_blank" class="bl-link">방문 →</a>';
    html += '</div>';
  });
  wrap.innerHTML = html;
}

/* ============================================
   캘린더 & 스트릭
============================================ */
function renderCalendar() {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth();
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var todayDate = now.getDate();

  var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = '📅 ' + year + '년 ' + monthNames[month] + ' 기록';

  var wrap = document.getElementById('calendarGrid');
  var dayNames = ['일','월','화','수','목','금','토'];
  var html = '';
  dayNames.forEach(function(d){ html += '<div class="cal-header">'+d+'</div>'; });
  for (var i = 0; i < firstDay; i++) { html += '<div class="cal-day empty"></div>'; }
  for (var d = 1; d <= daysInMonth; d++) {
    var mm = String(month+1).padStart(2,'0');
    var dd = String(d).padStart(2,'0');
    var dateStr = year + '-' + mm + '-' + dd;
    var cls = 'cal-day';
    if (state.calendar[dateStr]) cls += ' completed';
    if (d === todayDate) cls += ' today';
    html += '<div class="'+cls+'">'+d+'</div>';
  }
  wrap.innerHTML = html;
}

function updateStreak() {
  var streak = 0;
  var d = new Date();
  for (var i = 0; i < 365; i++) {
    var mm = String(d.getMonth()+1).padStart(2,'0');
    var dd = String(d.getDate()).padStart(2,'0');
    var dateStr = d.getFullYear() + '-' + mm + '-' + dd;
    if (state.calendar[dateStr]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (i === 0) {
      d.setDate(d.getDate() - 1);
      continue;
    } else {
      break;
    }
  }
  state.streak = streak;
  document.getElementById('streakNum').textContent = streak;
  saveState();
}

/* ============================================
   유틸리티
============================================ */
function getToday() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getDayNum() {
  var start = new Date(2025, 0, 1);
  return Math.floor((new Date() - start) / 86400000);
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById(tabId).classList.add('active');
  if (btn) btn.classList.add('active');
}

function resetAll() {
  if (!confirm('모든 데이터를 초기화하시겠습니까?')) return;
  localStorage.removeItem('pb_state');
  location.reload();
}

/* ============================================
   초기화
============================================ */
function init() {
  loadState();
  if (state.user && state.place && state.industry) {
    document.getElementById('loginScreen').style.display = 'none';
    startDashboard();
  } else if (state.user) {
    showOnboarding();
  }
}

init();
</script>
