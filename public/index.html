<style>

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}

<body>
<header>
  <h1>플레이스부스터</h1>
  <p>네이버 스마트플레이스 상위노출 자동화 시스템</p>
</header>
<div class="container">
  <div id="loginScreen" class="login-screen">
    <h2>플레이스부스터</h2>
    <p>키워드 분석 · 소개글 생성 · SEO 진단 · 미션 관리</p>
    <button class="btn-naver" onclick="startNaverLogin()">🟢 네이버로 시작하기</button>

  </div>
  <div id="onboarding" class="onboarding">

      <div class="search-box">
        <input type="text" id="placeSearchInput" placeholder="업체명 또는 키워드 입력">
        <button onclick="searchPlace()">검색</button>

      <div id="placeResults" class="place-list"></div>
    </div>

    </div>
  </div>
  <div id="dashboard" class="dashboard">

      <div>
        <div class="name" id="userName">사용자</div>

        <h3>🔍 키워드 분석</h3>

        <div class="search-box">
          <input type="text" id="kwInput" placeholder="예: 홍대 맛집">
          <button onclick="analyzeKeyword()">분석</button>
        </div>
        <button class="btn-secondary" onclick="autoAnalyze()">🤖 업종 기반 자동 분석</button>

      <div class="card hidden" id="trendCard">

  <button class="tab-btn" onclick="switchTab('tabMission',this)"><span class="tab-icon">🎯</span>미션</button>
  <button class="tab-btn" onclick="switchTab('tabCalendar',this)"><span class="tab-icon">📅</span>캘린더</button>
</nav>
<script>
module.exports = async (req, res) => {
  res.setHeader('Access-Control-Allow-Origin', 'https://place.living1004.com');
  res.setHeader('Access-Control-Allow-Methods', 'POST, OPTIONS');
  res.setHeader('Access-Control-Allow-Headers', 'Content-Type');
  if (req.method === 'OPTIONS') return res.status(200).end();
  if (req.method !== 'POST') return res.status(405).json({ error: 'POST only' });

  var body = req.body || {};
  var industry = body.industry;
  var region = body.region;
  var placeName = body.placeName;
  var speciality = body.speciality || '';
  var topKeywords = body.topKeywords || [];

  if (!industry || !region || !placeName) {
    return res.status(400).json({ error: 'industry, region, placeName 필수' });
  }

  var TEMPLATES = {
    restaurant: {
      name: '음식점',
      intro: [
        region + ' 맛집을 찾고 계신가요? ' + placeName + '은(는) ' + (speciality || '정성 가득한 요리') + '로 유명한 ' + region + ' 대표 맛집입니다.',
        region + '에서 특별한 한 끼를 원하신다면 ' + placeName + '을(를) 추천드립니다. ' + (speciality || '신선한 재료와 정통 레시피') + '로 준비합니다.',
        placeName + ' — ' + region + '에서 사랑받는 맛집. ' + (speciality || '매일 새벽 공수하는 신선한 재료') + '와 정성으로 손님을 맞이합니다.'
      ],
      descSections: [
        { title: '대표 메뉴', hint: '시그니처 메뉴명과 가격, 특징을 2~3개 작성하세요.' },
        { title: '매장 분위기', hint: '인테리어, 좌석 수, 단체석/룸 유무를 작성하세요.' },
        { title: '오시는 길', hint: '지하철역 출구 번호, 도보 소요시간, 주차 가능 여부를 작성하세요.' },
        { title: '영업 안내', hint: '영업시간, 브레이크타임, 라스트오더, 휴무일을 작성하세요.' }
      ],
      keywordTips: [
        '소개글 첫 문장에 "지역+맛집" 키워드를 넣으세요.',
        '메뉴 설명에 대표 키워드를 자연스럽게 1회 삽입하세요.',
        '"오시는 길"에 지역 키워드를 한 번 더 반복하세요.',
        '계절 메뉴가 있다면 시즌 키워드를 활용하세요.'
      ]
    },
    cafe: {
      name: '카페',
      intro: [
