<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>로그인 처리 중...</title>
<style>
body{font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f6f8;color:#222;text-align:center}
.wrap{padding:40px}
.spinner{display:inline-block;width:36px;height:36px;border:4px solid #e0e0e0;border-top-color:#03C75A;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:18px;margin-bottom:8px}
p{font-size:14px;color:#666}
.error{color:#ff4757;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner" id="spinner"></div>
  <h2 id="statusTitle">로그인 처리 중...</h2>
  <p id="statusMsg">잠시만 기다려주세요.</p>
</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var returnedState = params.get('state');
  var savedState = sessionStorage.getItem('oauth_state');

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('statusTitle').textContent = '로그인에 실패했습니다.';
    document.getElementById('statusTitle').classList.add('error');
    document.getElementById('statusMsg').textContent = msg;
  }

  if (!code) {
    showError('인증 코드가 없습니다. 다시 시도해주세요.');
    setTimeout(function(){ location.href = '/'; }, 3000);
    return;
  }

  // state 검증 (sessionStorage에 저장된 값과 비교)
  if (savedState && returnedState && savedState !== returnedState) {
    showError('보안 검증 실패 (state mismatch)');
    setTimeout(function(){ location.href = '/'; }, 3000);
    return;
  }

  // 토큰 교환
  fetch('/api/naver-token?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(returnedState || ''))
    .then(function(r){ return r.json(); })
    .then(function(tokenData){
      if (tokenData.error || !tokenData.access_token) {
        showError('토큰 발급 실패: ' + (tokenData.error || '알 수 없는 오류'));
        setTimeout(function(){ location.href = '/'; }, 3000);
        return;
      }
      // 프로필 조회
      return fetch('/api/naver-profile', {
        headers: { 'Authorization': 'Bearer ' + tokenData.access_token }
      });
    })
    .then(function(r){ if(r) return r.json(); })
    .then(function(profileData){
      if (!profileData || !profileData.response) {
        showError('프로필 조회 실패');
        setTimeout(function(){ location.href = '/'; }, 3000);
        return;
      }
      var user = profileData.response;
      // 기존 state 로드
      var pbState = {};
      try {
        var saved = localStorage.getItem('pb_state');
        if (saved) pbState = JSON.parse(saved);
      } catch(e) {}

      pbState.user = {
        name: user.name || user.nickname || '사용자',
        email: user.email || '',
        nickname: user.nickname || ''
      };

      localStorage.setItem('pb_state', JSON.stringify(pbState));
      sessionStorage.removeItem('oauth_state');

      document.getElementById('statusTitle').textContent = '로그인 성공!';
      document.getElementById('statusMsg').textContent = pbState.user.name + '님 환영합니다.';

      setTimeout(function(){ location.href = '/'; }, 1000);
    })
    .catch(function(err){
      showError('로그인 처리 오류: ' + err.message);
      setTimeout(function(){ location.href = '/'; }, 3000);
    });
})();
</script>
</body>
</html>
